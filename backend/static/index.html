<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>KOMBAJN AI – Startup Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
    <style>
      body { min-height: 100vh; background: #2b2b2b; color: #a9b7c6; }
      .vf-shell { max-width: 1140px; background: #3c3f41; border-radius: 12px; box-shadow: 0 16px 40px rgba(0, 0, 0, 0.7); border: 1px solid #4b4b4b; }
      .card.bg-dark { background-color: #3c3f41 !important; border-color: #4b4b4b !important; }
      .card-title, .text-secondary { color: #a9b7c6 !important; }
      .badge-dot { width: 8px; height: 8px; border-radius: 999px; background: #629755; display: inline-block; }
      .bg-dark-subtle { background-color: #313335 !important; color: #a9b7c6 !important; border-color: #4b4b4b !important; }
      .btn-outline-primary, .btn-outline-primary:hover { border-color: #6897bb; color: #a9b7c6; }
      .btn-outline-success, .btn-outline-success:hover { border-color: #6a8759; color: #a9b7c6; }
      .btn-outline-light, .btn-outline-light:hover { border-color: #a9b7c6; color: #a9b7c6; }
    </style>
  </head>
  <body>
    <div class="d-flex align-items-center justify-content-center py-4 px-2">
      <main class="vf-shell w-100 px-3 px-md-4 py-3 py-md-4">
        <header class="d-flex flex-column flex-md-row align-items-md-center justify-content-between mb-3 gap-2">
          <div>
            <h1 class="h5 mb-1 text-uppercase text-light">KOMBAJN AI <span class="text-secondary">/ The Visual Foundry</span></h1>
          </div>
          <div class="d-inline-flex align-items-center gap-2 small border rounded-pill px-3 py-1 bg-dark-subtle text-light">
            <span class="badge-dot"></span>
            <span>Local Docker stack</span>
          </div>
        </header>

        <div class="row g-3">
          <section class="col-12">
            <div class="card bg-dark border-secondary-subtle h-100">
              <div class="card-body">
                <h2 class="card-title h6 text-uppercase text-secondary mb-3">Navigation</h2>
                <div class="row g-2">
                  <div class="col-12 col-md-4">
                    <a href="/docs" target="_blank" class="btn btn-outline-primary w-100 text-start">
                      <div class="fw-semibold">API · FastAPI docs</div>
                    </a>
                  </div>
                  <div class="col-12 col-md-4">
                    <a href="/health/full" target="_blank" class="btn btn-outline-success w-100 text-start">
                      <div class="fw-semibold">Health · Full Path</div>
                    </a>
                  </div>
                  <div class="col-12 col-md-4">
                    <a href="http://localhost:8501" target="_blank" class="btn btn-outline-light w-100 text-start">
                      <div class="fw-semibold">🎬 J2V Studio</div>
                    </a>
                  </div>
                  <div class="col-12 col-md-4">
                    <a href="http://localhost:5555" target="_blank" class="btn btn-outline-light w-100 text-start">
                      <div class="fw-semibold">📊 Flower (Tasks)</div>
                    </a>
                  </div>
                  <div class="col-12 col-md-4">
                    <a href="http://localhost:8081" target="_blank" class="btn btn-outline-light w-100 text-start">
                      <div class="fw-semibold">💾 Redis (Data)</div>
                    </a>
                  </div>
                </div>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>
  </body>
</html>
